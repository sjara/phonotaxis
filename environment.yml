name: phonotaxis
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - pyqt>=6
  - pip
  - pip:
      # Use pip to install your project itself, and any dependencies not on conda-forge
      - -e .  # This installs your project in editable mode

# If pip fails to install sounddevice or opencv-python (e.g. on Windows, due to
# their native/binary dependencies), try installing them via conda-forge instead:
#   conda install -c conda-forge python-sounddevice opencv